services:
  # 🔊 Ultra-fast echo server
  echo:
    image: golang:1.24
    working_dir: /app
    command: go run main.go
    volumes:
      - ../cmd/echo:/app
    ports:
      - "9000:9000"

  # 🌀 AnyGate
  anygate:
    build:
      context: ../
    volumes:
      - ./anygate.yml:/config.yml
    ports:
      - "8001:8000"
    depends_on:
      - echo

  # 📦 NGINX (конфиг прокидываем)
  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8002:80"
    depends_on:
      - echo

  nginx-dark:
    image: nginx:1.27
    volumes:
      - ./nginx-dark.conf:/etc/nginx/nginx.conf
    ports:
      - "8004:80"
    depends_on:
      - echo


  # ⚙️ HAProxy
  haproxy:
    image: haproxy:3.1
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports:
      - "8003:80"
    depends_on:
      - echo

  # 🧪 Benchmark (используй вручную)
  wrk:
    image: williamyeh/wrk
    entrypoint: ["/bin/sh"]
    tty: true
    # entrypoint: ["sh", "-c", "tail -f /dev/null"]  # запускаем в фоне, запускай команды руками
